name: weekly-strategy
on:
  schedule:
    - cron: "29 6 * * 1"   # Mondays 06:29 UTC
  workflow_dispatch: {}
concurrency:
  group: repo-writer
  cancel-in-progress: false
permissions:
  contents: write
jobs:
  weekly:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      MAX_DAILY_BUDGET_GBP: "25"
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with: { node-version: 20 }
      - name: Install agent deps
        working-directory: agents
        run: npm ci || npm install
      - name: Learn (weekly narrative)
        working-directory: agents
        run: node learn.js --weekly
      - name: Master (weekly strategy)
        working-directory: agents
        run: node master.js --weekly
      - name: Commit
        run: |
          git config user.name "herbody-fleet[bot]"
          git config user.email "fleet@herbody.local"
          git add data/
          git diff --cached --quiet && echo "no changes" && exit 0
          git commit -m "fleet: weekly strategy $(date -u +%F) [bot]"
          for i in 1 2 3; do
            git pull --rebase origin ${GITHUB_REF_NAME} && git push && exit 0
            sleep $((RANDOM % 5 + 2))
          done
          exit 1
