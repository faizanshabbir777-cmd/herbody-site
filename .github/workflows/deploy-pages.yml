name: Deploy site to GitHub Pages

# Publishes the static HerBody site so it can be shared at a public URL.
# The github-pages environment only permits deployments from the default
# branch, so this runs on main (and on demand) — not on feature branches.

on:
  push:
    branches:
      - main
    # Path-filtered so agent/theme/doc commits don't trigger needless rebuilds.
    # The Pages artifact includes the whole repo root (site + /dash + /data).
    paths:
      - "*.html"
      - "*.css"
      - "*.js"
      - "*.png"
      - "*.svg"
      - "*.xml"
      - "*.txt"
      - "*.webmanifest"
      - ".nojekyll"
      - "dash/**"
      - "data/**"
  workflow_dispatch:

# Permissions required by the official Pages deploy actions.
permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; don't cancel an in-progress publish.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5
        with:
          # Turn Pages on automatically the first time this runs.
          enablement: true

      - name: Upload site artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # The whole repo root is the static site (plain HTML/CSS/JS).
          path: .

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
