name: publish-approved
# Publishes human-approved queue items. Without platform credentials, items become
# "ready-manual" with copy-paste payloads visible in the dashboard.
on:
  schedule:
    - cron: "43 7-21/2 * * *"   # every 2h daytime UTC
  workflow_dispatch: {}
concurrency:
  group: repo-writer
  cancel-in-progress: false
permissions:
  contents: write
jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      TIKTOK_ACCESS_TOKEN: ${{ secrets.TIKTOK_ACCESS_TOKEN }}
      META_ACCESS_TOKEN: ${{ secrets.META_ACCESS_TOKEN }}
      META_IG_USER_ID: ${{ secrets.META_IG_USER_ID }}
      META_PAGE_ID: ${{ secrets.META_PAGE_ID }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 20 }
      - name: Install agent deps
        working-directory: agents
        run: npm ci || npm install
      - name: Publish approved items
        working-directory: agents
        run: node publish.js
      - name: Commit
        run: |
          git config user.name "herbody-fleet[bot]"
          git config user.email "fleet@herbody.local"
          git add data/
          git diff --cached --quiet && echo "no changes" && exit 0
          git commit -m "publish: approved items $(date -u +%FT%H:%M) [bot]"
          for i in 1 2 3; do
            git pull --rebase origin ${GITHUB_REF_NAME} && git push && exit 0
            sleep $((RANDOM % 5 + 2))
          done
          exit 1
