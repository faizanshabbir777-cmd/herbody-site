# HerBody — Google Search brand v1 · DRAFT, built PAUSED.
# Live only when the human approval file (approvals/) lists this campaign.
# RSA limits respected: headlines <= 30 chars, descriptions <= 90 chars.
# Channel budget rule: Google total across campaigns <= £25/day (brand £10 + non-brand £10 = £20).

campaign:
  name: HB_UK_GOOGLE_SEARCH_BRAND_V1
  platform: google
  status: PAUSED
  objective: SEARCH_CONVERSIONS
  network: search_only            # no search partners, no display expansion
  daily_budget_gbp: 10
  bidding: MAXIMIZE_CONVERSIONS   # switch to tCPA after >= 30 conversions
  geo: United Kingdom
  language: en
  landing_page: https://{{SHOPIFY_STORE_DOMAIN}}/products/the-daily-creatine-collagen
  utm_base: utm_source=google&utm_medium=cpc&utm_campaign=hb_uk_google_search_brand_v1

campaign_negative_keywords:
  - { text: "jobs",     match_type: PHRASE }
  - { text: "careers",  match_type: PHRASE }
  - { text: "free",     match_type: PHRASE }
  - { text: "amazon",   match_type: PHRASE }
  - { text: "ebay",     match_type: PHRASE }
  - { text: "reviews",  match_type: PHRASE }   # no verified reviews exist yet (DMCC) — avoid SERP promise mismatch; remove once review platform is live
  - { text: "discount code", match_type: PHRASE }

sitelinks:
  - { text: "The Daily — Formula", final_url: "https://{{SHOPIFY_STORE_DOMAIN}}/products/the-daily-creatine-collagen", desc1: "5g + 5g + a multivitamin", desc2: "Every dose printed" }
  - { text: "The Pledge",          final_url: "https://{{SHOPIFY_STORE_DOMAIN}}/products/the-daily-creatine-collagen#pledge", desc1: "20% of profits, audited", desc2: "You choose the cause" }
  - { text: "First 7 Days Plan",   final_url: "https://{{SHOPIFY_STORE_DOMAIN}}/pages/tiktok", desc1: "The gentle way to start", desc2: "Half-scoop week, explained" }
  - { text: "Subscribe & Save 15%", final_url: "https://{{SHOPIFY_STORE_DOMAIN}}/products/the-daily-creatine-collagen", desc1: "£33.99 · 21 servings", desc2: "Pause or cancel any time" }

ad_groups:
  - name: HB_BRAND_CORE
    status: PAUSED
    keywords:
      - { text: "herbody",              match_type: EXACT }
      - { text: "herbody",              match_type: PHRASE }
      - { text: "her body supplement",  match_type: EXACT }
      - { text: "herbody the daily",    match_type: EXACT }
      - { text: "herbody creatine",     match_type: EXACT }
      - { text: "herbody collagen",     match_type: EXACT }
    rsa:
      final_url: https://{{SHOPIFY_STORE_DOMAIN}}/products/the-daily-creatine-collagen?utm_source=google&utm_medium=cpc&utm_campaign=hb_uk_google_search_brand_v1&utm_content=rsa_brand01&utm_term={keyword}
      path1: the-daily
      path2: official
      headlines:              # all <= 30 chars
        - "HerBody — Official Site"
        - "HerBody No.01 — The Daily"
        - "Creatine + Collagen For Women"
        - "5g + 5g + A Multivitamin"
        - "The Studied Dose"
        - "One Scoop. 13 Actives."
        - "From £1.62 A Day Subscribed"
        - "Halal Certified · HMC"
        - "Batch Tested — COA Per Lot"
        - "Made In A UK GMP Facility"
        - "Strawberry Lemonade Flavour"
        - "21 Servings Per Pouch"
        - "30-Day Flavour Guarantee"
        - "Subscribe & Save 15%"
        - "Good For You. Good For Her."
      descriptions:           # all <= 90 chars
        - "5g Creapure® creatine, 5g Verisol® collagen and a complete multivitamin in one scoop."
        - "Halal certified, batch tested, made in the UK. Nothing hidden, nothing vague."
        - "£39.99 one-time or £33.99 subscribed — from £1.62 a day. 30-day flavour guarantee."
