# HerBody — Google Search non-brand v1 · DRAFT, built PAUSED.
# Live only when the human approval file (approvals/) lists this campaign.
# TARGETING NOTE: keywords are product-category terms only. We do NOT bid on
# condition terms (pcos, hormones, bloating, hair loss etc.) — that is
# sensitive-health targeting and problem-calling by keyword. Negatives enforce this.
# RSA limits respected: headlines <= 30 chars, descriptions <= 90 chars.

campaign:
  name: HB_UK_GOOGLE_SEARCH_NONBRAND_V1
  platform: google
  status: PAUSED
  objective: SEARCH_CONVERSIONS
  network: search_only
  daily_budget_gbp: 10
  bidding: MAXIMIZE_CLICKS        # cold start; move to conversions once data exists
  geo: United Kingdom
  language: en
  landing_page: https://{{SHOPIFY_STORE_DOMAIN}}/products/the-daily-creatine-collagen
  utm_base: utm_source=google&utm_medium=cpc&utm_campaign=hb_uk_google_search_nonbrand_v1

campaign_negative_keywords:
  # commercial hygiene
  - { text: "free",      match_type: PHRASE }
  - { text: "cheap",     match_type: PHRASE }
  - { text: "amazon",    match_type: PHRASE }
  - { text: "ebay",      match_type: PHRASE }
  - { text: "jobs",      match_type: PHRASE }
  # audience fit
  - { text: "for men",   match_type: PHRASE }
  - { text: "mens",      match_type: PHRASE }
  # sensitive-health / condition terms — HARD RULE, never remove
  - { text: "pcos",           match_type: PHRASE }
  - { text: "hormone",        match_type: PHRASE }
  - { text: "hormones",       match_type: PHRASE }
  - { text: "bloating",       match_type: PHRASE }
  - { text: "hair loss",      match_type: PHRASE }
  - { text: "pregnancy",      match_type: PHRASE }
  - { text: "pregnant",       match_type: PHRASE }
  - { text: "breastfeeding",  match_type: PHRASE }
  - { text: "fertility",      match_type: PHRASE }
  - { text: "menopause",      match_type: PHRASE }
  - { text: "weight loss",    match_type: PHRASE }
  - { text: "side effects",   match_type: PHRASE }
  # minors
  - { text: "for kids",  match_type: PHRASE }
  - { text: "teen",      match_type: PHRASE }

sitelinks:
  - { text: "See The Full Label",   final_url: "https://{{SHOPIFY_STORE_DOMAIN}}/products/the-daily-creatine-collagen", desc1: "13 actives, every dose", desc2: "printed on the front" }
  - { text: "Batch Testing & COA",  final_url: "https://{{SHOPIFY_STORE_DOMAIN}}/products/the-daily-creatine-collagen#quality", desc1: "Third-party tested", desc2: "Certificate per lot" }
  - { text: "The Pledge",           final_url: "https://{{SHOPIFY_STORE_DOMAIN}}/products/the-daily-creatine-collagen#pledge", desc1: "20% of profits, audited", desc2: "You choose the cause" }
  - { text: "Subscribe & Save 15%", final_url: "https://{{SHOPIFY_STORE_DOMAIN}}/products/the-daily-creatine-collagen", desc1: "£33.99 · 21 servings", desc2: "From £1.62 a day" }

