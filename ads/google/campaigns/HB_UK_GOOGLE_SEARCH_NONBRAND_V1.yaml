    - "One Scoop. 13 Actives."
    - "HerBody No.01 — The Daily"
    - "From £1.62 A Day Subscribed"
    - "Halal Certified · HMC"
    - "Batch Tested — COA Per Lot"
    - "Made In A UK GMP Facility"
    - "Strawberry Lemonade Flavour"
    - "21 Servings Per Pouch"
    - "30-Day Flavour Guarantee"
    - "Subscribe & Save 15%"
    - "Nothing Hidden Nothing Vague"
    - "Good For You. Good For Her."
