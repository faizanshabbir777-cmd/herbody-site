# HerBody — TikTok retargeting v1 · DRAFT, built PAUSED.
#
# ACTIVATION RULES (all must hold first):
#   1. TikTok Pixel + Events API live via Shopify app, CompletePayment verified >= 7 days.
#   2. Custom audiences below EXIST and meet TikTok's 1,000-user minimum before launch.
#   3. Audiences are engagement/traffic-based ONLY — video viewers, profile engagers,
#      site visitors. NEVER sensitive-health signals, condition keywords, pregnancy
#      status or body-image segments, as inclusion, exclusion or lookalike seed.
#   4. Human approval file in approvals/ lists this campaign by name.
#
# Channel budget rule: TikTok total across ALL campaigns <= £25/day.

campaign:
