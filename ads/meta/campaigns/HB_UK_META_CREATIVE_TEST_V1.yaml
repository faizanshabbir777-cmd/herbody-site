# before scaling winners into HB_UK_META_PROSPECTING_THEDAILY_V1.
# Method: one ad set, ABO, 3–5 ads, no early edits for 7 days; judge on CTR + CPA.
# Channel budget rule: Meta total across ALL campaigns <= £25/day (15 + 5 + 5 = 25).

campaign:
